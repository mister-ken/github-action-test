name: Docker Image CI

# publish new image when changes are made to the 
# Dockerfile, main.go, or any files in the templates directory
on:
  push:
    paths:
      - 'Dockerfile'
      - 'main.go'
      - 'templates/**'

env:
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository }}
  IMAGE_NAME: k8s-vault-client

jobs:
   build:
      name: Build docker images
      runs-on: ubuntu-latest

      permissions:
         contents: read
         packages: write
         attestations: write
         id-token: write

      steps:
         - name: checkout code
           uses: actions/checkout@v5
         - name: Login to GitHub Container Registry
           uses: docker/login-action@v4
           with:
               registry: ${{ env.REGISTRY }}
               username: ${{ github.actor }} 
               password: ${{ secrets.GH_TOKEN_PACKAGES }}

         - name: Extract metadata for Docker
           id: meta
           uses: docker/metadata-action@v4
           with:
               images: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
               tags: type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}
         - name: Build and push Landing Page Docker image
           uses: docker/build-push-action@v7
           with:
              file: ./Dockerfile
              context: .
              push: true
              github-token: ${{ secrets.GH_TOKEN_PACKAGES }}
              tags: ${{ steps.meta.outputs.tags }}
              labels: ${{ steps.meta.outputs.labels }}