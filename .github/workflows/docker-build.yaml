name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
#   DOCKER_BUILDKIT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:
    name: Build docker images
    runs-on: self-hosted

    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
         registry: ghcr.io/mister-ken/github-action-test
         username: ${{ github.actor }}
         password: ${{ secrets.GH_TOKEN_PACKAGES }}
    - name: Build and push Landing Page Docker image
      uses: docker/build-push-action@v7
      with:
        file: ./Dockerfile
      #   project: github-action-test
        push: true
        github-token: ${{ secrets.GH_TOKEN_PACKAGES }}
        tags: ghcr.io/mister-ken/github-action-test/vault-k8s-client:latest
      # run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
        