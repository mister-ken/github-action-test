name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
#   DOCKER_BUILDKIT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository }}
  IMAGE_NAME: k8s-vault-client

jobs:

  build:
    name: Build docker images
    runs-on: self-hosted
   #  runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      # artifact-metadata: write

    steps:
    - name: checkout code
      uses: actions/checkout@v5
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
         registry: ${{ env.REGISTRY }}
         username: ${{ github.actor }} 
         password: ${{ secrets.GH_TOKEN_PACKAGES }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v4
      with:
         images: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
      #   images: ${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}

    - name: Build and push Landing Page Docker image
      uses: docker/build-push-action@v7
      with:
        file: ./Dockerfile
      #   project: github-action-test
        context: .
        push: true
        github-token: ${{ secrets.GH_TOKEN_PACKAGES }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

   #  - name: Generate artifact attestation
   #    uses: actions/attest-build-provenance@v3
   #    with:
   #      subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
   #      subject-digest: ${{ steps.push.outputs.digest }}
   #      push-to-registry: true